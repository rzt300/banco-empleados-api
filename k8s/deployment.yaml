apiVersion: apps/v1
kind: Deployment
metadata:
  name: banco-empleados-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: banco-empleados-api
  template:
    metadata:
      labels:
        app: banco-empleados-api
    spec:
      containers:
      - name: banco-empleados-api
        image: rzt300/banco-empleados-api:latest
        ports:
        - containerPort: 5000
        livenessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 10
          periodSeconds: 30
